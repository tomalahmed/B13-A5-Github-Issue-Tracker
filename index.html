<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Geist", sans-serif;
            background-color: #f6f8fa;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }


        .border-open {
            border-top: 4px solid #00A96E;
        }

        .border-closed {
            border-top: 4px solid #A855F7;
        }

        .tab-active {
            background-color: #4A00FF;
            color: white;
            border-color: #4A00FF;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-4 py-3 shadow-sm sticky top-0 z-10 w-full">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <!-- Logo  -->
            <div class="flex items-center gap-3 cursor-pointer"><a href="./index.html" class="flex items-center gap-3">
                    <img src="./assets/github-logo.png" alt="Logo" class="w-6 h-6">
                    <span class="text-xl font-semibold text-gray-900">GitHub Issues Tracker</span>
                </a>
            </div>

            <!-- Search  -->
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="relative w-full sm:w-80">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="text" id="searchInput"
                        class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-400 focus:outline-none focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF] sm:text-sm"
                        placeholder="Search issues...">
                </div>
                <!-- Search Button -->
                <button id="searchBtn"
                    class="px-4 py-2 bg-[#4A00FF] text-white text-sm font-medium rounded-md hover:bg-[#3b00cc] focus:outline-none flex justify-center items-center gap-1 whitespace-nowrap">
                    Search
                </button>
                <!-- Logout Button -->
                <button id="logoutBtn"
                    class="px-4 py-2 bg-red-500 text-white text-sm font-medium rounded-md hover:bg-red-600 focus:outline-none flex justify-center items-center gap-1 whitespace-nowrap">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">

        <!-- Controls Section -->
        <div class="mb-6 flex flex-col gap-6">

            <!-- Tabs Container -->
            <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm flex">
                <div class="inline-flex rounded-md border border-gray-200 overflow-hidden" id="tabsContainer">
                    <button data-tab="all"
                        class="px-8 py-2 text-sm font-medium border-r border-gray-200 tab-active transition-colors bg-[#4A00FF] text-white">All</button>
                    <button data-tab="open"
                        class="px-8 py-2 text-sm font-medium border-r border-gray-200 tab-inactive transition-colors bg-white text-gray-600 hover:bg-gray-50">Open</button>
                    <button data-tab="closed"
                        class="px-8 py-2 text-sm font-medium tab-inactive transition-colors bg-white text-gray-600 hover:bg-gray-50">Closed</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-200 pb-6">
                <!-- Left -->
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-purple-100/50 rounded-full flex items-center justify-center shrink-0">
                        <img src="./assets/Aperture.png" alt="Aperture" class="w-6 h-6">
                    </div>
                    <div>
                        <div class="flex items-center gap-1">
                            <span id="issueCount" class="font-bold text-xl text-gray-900">0</span>
                            <span class="font-bold text-xl text-gray-900">Issues</span>
                        </div>
                        <p class="text-sm text-gray-500 mt-0.5">Track and manage your project issues</p>
                    </div>
                </div>

                <!-- Right -->
                <div class="flex items-center gap-5 text-sm font-medium text-gray-800">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Open-Status.png" alt="Open" class="w-4 h-4">
                        Open
                    </div>
                    <div class="flex items-center gap-2">
                        <img src="./assets/Closed- Status.png" alt="Closed" class="w-4 h-4">
                        Closed
                    </div>
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loadingSpinner" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-500">Loading issues...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-10 text-red-600 bg-red-50 rounded-lg border border-red-200">
            <svg class="mx-auto h-12 w-12 text-red-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <p id="errorMessage" class="font-medium"></p>
        </div>

        <!-- Custom Empty State -->
        <div id="emptyState"
            class="hidden text-center py-16 bg-white rounded-lg border border-gray-200 shadow-sm text-gray-500">
            <svg class="mx-auto h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <h3 class="text-lg font-medium text-gray-900 mb-1">No issues found</h3>
            <p class="text-sm">Try adjusting your search or filter to find what you're looking for.</p>
        </div>

        <!-- Issue Cards Container -->
        <div id="issueCardsContainer" class="hidden grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>

    </main>

    <!-- Modal Base (Hidden by default) -->
    <div id="issueModal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" id="modalBackdrop"></div>

        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">

                <!-- Modal Panel -->
                <div
                    class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-xl border border-gray-200">

                    <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4 relative min-h-[150px]">
                        <!-- Modal Loader -->
                        <div id="modalLoader"
                            class="hidden absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center rounded-t-lg">
                            <div class="loader mb-2 border-t-[#4A00FF]"></div>
                            <span class="text-xs text-gray-500 font-medium">Loading details...</span>
                        </div>

                        <div class="sm:flex sm:items-start w-full transition-opacity duration-200"
                            id="modalContentWrapper">
                            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                                <h3 class="text-xl font-semibold leading-6 text-gray-900 mb-2" id="modalTitle">Issue
                                    Title</h3>
                                <div class="flex items-center gap-2 mb-4 text-sm text-gray-500">
                                    <span id="modalStatusBadge"
                                        class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"></span>
                                    <span>•</span>
                                    <span>Opened by <span class="font-medium text-gray-700"
                                            id="modalAuthor"></span></span>
                                    <span>•</span>
                                    <span id="modalDate"></span>
                                </div>

                                <div id="modalLabels" class="flex flex-wrap gap-2 mb-4"></div>
                                <p id="modalDescription" class="text-sm text-gray-600 mb-6"></p>

                                <div class="mt-4 pt-4 border-t border-gray-200 flex justify-between">
                                    <div>
                                        <p class="text-xs text-gray-500 mb-1">Assignee</p>
                                        <p class="text-sm font-medium text-gray-900" id="modalAssignee">Unassigned</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xs text-gray-500 mb-1">Priority</p>
                                        <span id="modalPriority"
                                            class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 border-t border-gray-200">
                        <button type="button" id="closeModalBtn"
                            class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

<script src="./loadIssues.js"></script>
<script src="./script.js"></script>

</html>
