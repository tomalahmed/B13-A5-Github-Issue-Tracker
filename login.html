<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Geist", sans-serif;
            background-color: #f6f8fa;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Login Container -->
    <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 w-full max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-2xl font-semibold mb-2 text-gray-900">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                    placeholder="Enter Username" required>
                <p class="text-xs text-blue-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                    placeholder="Enter Password" required>
                <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Sign In
            </button>
        </form>

        <!-- Or -->
        <div class="mt-8 relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">OR</span>
            </div>
        </div>

        <!-- Demo Credentials Info -->
        <div class="mt-6">
            <p class="text-xs text-center text-gray-500 mb-2">Demo Credentials:</p>
            <div class="bg-gray-50 p-4 rounded-md text-center text-sm border border-gray-100">
                <p><span class="font-medium text-gray-700">Username:</span> admin</p>
                <p><span class="font-medium text-gray-700">Password:</span> admin123</p>
            </div>
        </div>

    </div>

    <script src="./login.js"></script>

</body>
</html>
